name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: A clear description of the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Click Start Capture with...
        2. Play audio from...
        3. Observe that...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Permissions / Setup
        - Audio Capture
        - Speech Recognition
        - Translation
        - Overlay Display
        - Session History / Logs
        - Settings
        - Other
    validations:
      required: true

  - type: input
    id: ost-version
    attributes:
      label: OST Version or Commit
      description: Release version, build version, or commit SHA where you saw the issue.
      placeholder: e.g., 0.0.4 or abc1234
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: e.g., 15.3
    validations:
      required: true

  - type: textarea
    id: setup
    attributes:
      label: Permissions and Language Setup
      description: Share the setup details that affect capture, speech, and translation.
      placeholder: |
        Screen Recording: granted / denied / not prompted
        System Audio Recording: granted / denied / not prompted / not shown
        Speech Recognition: granted / denied / not prompted
        On-device recognition: enabled / disabled
        Source language: English / Korean / Japanese / Chinese Simplified / Auto
        Target language: English / Korean / Japanese / Chinese Simplified
        Apple Translation language pack: installed / downloadable / unavailable / unknown
        Online fallback translation: enabled / disabled
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Debug Logs
      description: Paste relevant entries from OST > Debug Console, especially Audio, Speech, Translation, or Error logs.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, log output, or anything else that might help.
